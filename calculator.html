<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculator — munxha</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .calc {max-width:380px;margin:2rem auto;padding:1.25rem;border-radius:18px;background:linear-gradient(180deg,#e6eef6,#dfeaf2);box-shadow:0 18px 40px rgba(15,23,36,0.12);border:1px solid rgba(0,0,0,0.06)}
    .display{background:linear-gradient(180deg,#0b1220,#172033);border-radius:12px;padding:1rem;font-size:2rem;text-align:right;color:#fff;border:1px solid rgba(255,255,255,0.06);box-shadow:inset 0 -8px 18px rgba(0,0,0,0.35)}
    .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-top:.85rem}
    .key{padding:.85rem;border-radius:10px;background:linear-gradient(180deg,#f8fafc,#eef6fb);border:1px solid rgba(0,0,0,0.06);cursor:pointer;text-align:center;font-weight:700;box-shadow:0 6px 0 rgba(0,0,0,0.06);user-select:none}
    .key:active{transform:translateY(2px);box-shadow:0 4px 0 rgba(0,0,0,0.05)}
    .key.op{background:linear-gradient(180deg,var(--accent),#7dd3fc);color:#042;box-shadow:0 6px 0 rgba(6,182,212,0.18)}
    .key#equals{background:linear-gradient(180deg,#10b981,#059669);color:#fff;grid-column:span 1}
    .key.zero{grid-column:span 2}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">munxha</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="todo.html">Tehtävälista</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2>Yksinkertainen laskin</h2>
        <div class="card calc">
          <div id="display" class="display">0</div>
          <div class="keys">
            <div class="key" data-val="7">7</div>
            <div class="key" data-val="8">8</div>
            <div class="key" data-val="9">9</div>
            <div class="key op" data-op="/">÷</div>

            <div class="key" data-val="4">4</div>
            <div class="key" data-val="5">5</div>
            <div class="key" data-val="6">6</div>
            <div class="key op" data-op="*">×</div>

            <div class="key" data-val="1">1</div>
            <div class="key" data-val="2">2</div>
            <div class="key" data-val="3">3</div>
            <div class="key op" data-op="-">−</div>

            <div class="key zero" data-val="0">0</div>
            <div class="key" data-val=".">.</div>
            <div class="key op" data-op="+">+</div>

            <div class="key" id="clear">C</div>
            <div class="key" id="equals">=</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> munxha — Email: <a href="mailto:muha48755@gmail.com">muha48755@gmail.com</a></div>
  </footer>

<script>
// Basic calculator logic
(function(){
  const display = document.getElementById('display');
  let current = '';
  let operator = null;
  let previous = null;

  function updateDisplay(v){ display.textContent = v; }

  function clearAll(){ current=''; operator=null; previous=null; updateDisplay('0'); }

  function inputDigit(d){
    if(d === '.' && current.includes('.')) return;
    current = current === '0' && d !== '.' ? d : (current + d);
    updateDisplay(current);
  }

  function applyOp(op){
    if(current === '' && previous == null) return;
    if(previous == null){ previous = parseFloat(current || '0'); current=''; operator = op; return; }
    if(current === ''){ operator = op; return; }
    const a = previous; const b = parseFloat(current);
    let res = 0;
    switch(operator){
      case '+': res = a + b; break;
      case '-': res = a - b; break;
      case '*': res = a * b; break;
      case '/': res = b === 0 ? 'Err' : a / b; break;
      default: res = b;
    }
    previous = (typeof res === 'number')? parseFloat(res.toFixed(10)) : res;
    current = '';
    operator = op;
    updateDisplay(previous);
  }

  function equals(){
    if(operator && (current !== '' || operator !== null)){
      applyOp(operator);
      operator = null;
      current = '';
    }
  }

  document.querySelectorAll('.key').forEach(k=>{
    k.addEventListener('click',()=>{
      const val = k.getAttribute('data-val');
      const op = k.getAttribute('data-op');
      if(val != null){ if(val === '0' && current === '0') return; inputDigit(val); }
      else if(op != null){ applyOp(op); }
      else if(k.id === 'clear'){ clearAll(); }
      else if(k.id === 'equals'){ equals(); }
    });
  });

  // set year
  const y = new Date().getFullYear(); document.getElementById('year').textContent = y;
})();
</script>
</body>
</html>
